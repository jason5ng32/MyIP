name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  check:
    name: Test + Build
    runs-on: ubuntu-latest
    # `node-version: 24` below sets the Node runtime for the project itself.
    # This env var is separate: it tells GitHub's Actions runner to execute
    # the JavaScript actions (checkout / setup-node / ...) on Node 24 instead
    # of the deprecated Node 20. After 2026-06-02 this will be the default and
    # the env var can be removed. See:
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # Intentionally no `cache: npm` — that requires a package-lock.json, and this
          # repo gitignores the lockfile by design. `npm install` below runs cold every
          # run; dependency install on this project takes ~30s, which is acceptable
          # versus the drift risk of committing a lockfile we don't otherwise use.

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
